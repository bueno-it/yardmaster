<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YardMaster — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
  }
  .logo span { color: #22c55e; }
  .logo p {
    font-size: 13px;
    color: #6b7280;
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #9ca3af;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 10px 14px;
    background: #0f1117;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #22c55e; }
  .btn-login {
    width: 100%;
    padding: 11px;
    background: #22c55e;
    color: #0f1117;
    font-weight: 700;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .btn-login:hover { background: #16a34a; }
  .error {
    background: #3b1f1f;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Yard<span>Master</span></h1>
    <p>Transport Management System</p>
  </div>
  {% if form.errors %}
  <div class="error">Invalid username or password.</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" autofocus autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password">
    <button type="submit" class="btn-login">Sign In</button>
  </form>
</div>
</body>
</html>
